name: Mobile OTA Update

on:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'EAS Update branch (production, preview, development)'
        required: true
        default: 'production'

concurrency:
  group: mobile-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Publish JS bundle to EAS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detect native-only changes
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping diff guard"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          git fetch --depth=1 origin "$base"
          changed=$(git diff --name-only "$base" "$head" -- packages/mobile/)
          echo "Changed files in packages/mobile/:"
          echo "$changed"
          if echo "$changed" | grep -E '^packages/mobile/(app\.json|eas\.json|plugins/|ios-extensions/|ios/|android/)' >/dev/null; then
            echo "::error::Native config changed (app.json / eas.json / plugins/ / ios-extensions/ / ios/ / android/). Run \`eas build\` + \`eas submit\` manually instead of OTA."
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if echo "$changed" | grep -E '^packages/mobile/package\.json$' >/dev/null; then
            echo "::warning::packages/mobile/package.json changed — make sure no native dependency was added. If you added something like react-native-* or expo-* with a config plugin, cancel this run and do a full eas build."
          fi
          echo "needs_build=false" >> "$GITHUB_OUTPUT"

      # Same Bun pin as ci.yml: 1.3.13 has subprocess bugs that can wedge a
      # bun process at exit (issue #289); keep at 1.3.14 or newer.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Workspace install from the repo root covers packages/mobile against
      # the single root lockfile.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck
        working-directory: packages/mobile

      - name: Publish update
        env:
          EAS_BRANCH: ${{ github.event.inputs.branch || 'production' }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.sha }}
        run: |
          message=$(printf '%s' "$COMMIT_MESSAGE" | head -n 1)
          eas update \
            --branch "$EAS_BRANCH" \
            --message "$message" \
            --non-interactive
        working-directory: packages/mobile
