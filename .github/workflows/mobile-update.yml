name: Mobile OTA Update

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'EAS Update branch (production, preview, development)'
        required: true
        default: 'production'

concurrency:
  group: mobile-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Publish JS bundle to EAS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect native-only changes
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping diff guard"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          changed=$(git diff --name-only "$base" "$head" -- mobile/)
          echo "Changed files in mobile/:"
          echo "$changed"
          if echo "$changed" | grep -E '^mobile/(app\.config\.ts|eas\.json|plugins/|ios-extensions/|ios/|android/)' >/dev/null; then
            echo "::error::Native config changed (app.config.ts / eas.json / plugins/ / ios-extensions/ / ios/ / android/). Run \`eas build\` + \`eas submit\` manually instead of OTA."
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if echo "$changed" | grep -E '^mobile/package\.json$' >/dev/null; then
            echo "::warning::mobile/package.json changed — make sure no native dependency was added. If you added something like react-native-* or expo-* with a config plugin, cancel this run and do a full eas build."
          fi
          echo "needs_build=false" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install mobile deps
        run: bun install --frozen-lockfile
        working-directory: mobile

      - name: Typecheck
        run: bun run typecheck
        working-directory: mobile

      - name: Publish update
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_OWNER: ${{ secrets.EXPO_OWNER }}
        run: |
          branch="${{ github.event.inputs.branch || 'production' }}"
          eas update \
            --branch "$branch" \
            --message "${{ github.event.head_commit.message || github.sha }}" \
            --non-interactive
        working-directory: mobile
