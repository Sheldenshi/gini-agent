name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck, test, build
    runs-on: ubuntu-latest
    # The five most recent successful runs of this job took between 1m30s and
    # 2m22s end to end. Without a cap, a wedged `bun test` process runs until
    # GitHub's 6-hour force-cancel, burning a runner for the full window and
    # red-checking the PR hours later (issue #289). 15 minutes is over 6x the
    # slowest observed run, so the cap only ever fires on a genuine hang.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Install zsh because terminal_exec / code_exec wrap commands
      # through `zsh -lc` (src/agent.ts:buildPtySpawnArgs and the
      # non-PTY spawn path both assume zsh is on $PATH). Ubuntu
      # runners ship with bash only; without this step the entire
      # terminal-exec / cron / chat-task test surface fails with
      # "Executable not found in $PATH: zsh".
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      # Keep Bun at 1.3.14 or newer. 1.3.13 intermittently wedged
      # `bun test --parallel` after every test passed: a worker's event loop
      # never drained, the run never printed its summary, and the job sat
      # until the 6-hour force-cancel with two orphan `bun` workers
      # (issue #289). Bun 1.3.14 fixed the responsible subprocess bugs:
      # a leaked PipeReader poll whose keep-alive ref prevented event-loop
      # exit, dropped subprocess 'exit' events on Linux when several
      # children exit simultaneously (EPOLLONESHOT pidfd race), and
      # subprocess objects kept alive when a grandchild inherits the
      # stdio pipe — all shapes this suite's cli/run + cli/update
      # subprocess tests exercise.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (root)
        run: bun install --frozen-lockfile

      - name: Install dependencies (web)
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install dependencies (mobile)
        run: bun install --frozen-lockfile
        working-directory: mobile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # Build the web app the way the update/install flows do — into a
      # production dist dir via GINI_DIST_DIR — and prove the result actually
      # serves. Installed runtimes serve `next start` from such a bundle
      # (ADR web-production-serving.md), so a commit that fails to build or
      # boot in prod mode must never land on main: it's exactly what every
      # install pulls on its next update.
      - name: Build web (production bundle)
        run: GINI_DIST_DIR=.next-prod-ci bun run build
        working-directory: web

      - name: Serve web production bundle and probe healthz
        working-directory: web
        run: |
          GINI_INSTANCE=ci GINI_DIST_DIR=.next-prod-ci PORT=7997 \
            bun run start -- -H 127.0.0.1 -p 7997 &
          server=$!
          # Kill the server on every exit path — a leaked next-start would
          # hold the job open until the timeout cap.
          trap 'kill "$server" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            body=$(curl -fsS http://127.0.0.1:7997/api/runtime/__healthz 2>/dev/null || true)
            if printf '%s' "$body" | grep -q '"service":"gini-web"'; then
              echo "healthz answered: $body"
              exit 0
            fi
            sleep 1
          done
          echo "web production server never answered /api/runtime/__healthz" >&2
          exit 1
